<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Ağaçlandırma Uygunluk Analiz Sistemi demo akışı</title>
  <desc id="desc">Saha yükleme, harita analizi, senaryo kıyaslama ve rapor üretimi adımlarını gösteren portföy görseli.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.55" stop-color="#24324f"/>
      <stop offset="1" stop-color="#2f80ed"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#e7eef8" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#07111f" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="120" r="170" fill="#b86b35" opacity="0.28"/>
  <circle cx="140" cy="610" r="210" fill="#2f80ed" opacity="0.22"/>
  <text x="72" y="86" fill="#fff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">Ağaçlandırma Uygunluk Analiz Sistemi</text>
  <text x="72" y="124" fill="#d7e6ff" font-family="Segoe UI, Arial, sans-serif" font-size="18">Saha verisini yükle, uygunluk skorunu üret, senaryoyu karşılaştır ve raporu indir.</text>
  <g filter="url(#shadow)">
    <rect x="72" y="190" width="250" height="310" rx="26" fill="url(#card)"/>
    <text x="104" y="246" fill="#172033" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">1. Saha Yükle</text>
    <text x="104" y="286" fill="#667085" font-family="Segoe UI, Arial, sans-serif" font-size="15">GeoJSON / SHP ZIP</text>
    <rect x="104" y="328" width="164" height="98" rx="18" fill="#eef3f9"/>
    <path d="M132 388 L166 354 L194 382 L214 366 L242 406 H132 Z" fill="#2f80ed" opacity="0.9"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="374" y="190" width="250" height="310" rx="26" fill="url(#card)"/>
    <text x="406" y="246" fill="#172033" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">2. Haritada İncele</text>
    <text x="406" y="286" fill="#667085" font-family="Segoe UI, Arial, sans-serif" font-size="15">Uygunluk, erozyon, yağış</text>
    <rect x="406" y="320" width="154" height="120" rx="18" fill="#dbeafe"/>
    <path d="M426 400 C462 350 498 430 540 366" fill="none" stroke="#172033" stroke-width="10" stroke-linecap="round"/>
    <circle cx="488" cy="382" r="18" fill="#b86b35"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="676" y="190" width="250" height="310" rx="26" fill="url(#card)"/>
    <text x="708" y="246" fill="#172033" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">3. Senaryo Kıyasla</text>
    <text x="708" y="286" fill="#667085" font-family="Segoe UI, Arial, sans-serif" font-size="15">Normal, kurak, yağışlı yıl</text>
    <rect x="708" y="332" width="54" height="92" rx="14" fill="#2f80ed"/>
    <rect x="784" y="364" width="54" height="60" rx="14" fill="#b86b35"/>
    <rect x="860" y="312" width="54" height="112" rx="14" fill="#64748b"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="978" y="190" width="230" height="310" rx="26" fill="url(#card)"/>
    <text x="1010" y="246" fill="#172033" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">4. Rapor Al</text>
    <text x="1010" y="286" fill="#667085" font-family="Segoe UI, Arial, sans-serif" font-size="15">PDF + metin çıktısı</text>
    <rect x="1010" y="326" width="134" height="116" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <line x1="1032" y1="358" x2="1122" y2="358" stroke="#2f80ed" stroke-width="8" stroke-linecap="round"/>
    <line x1="1032" y1="388" x2="1100" y2="388" stroke="#172033" stroke-width="8" stroke-linecap="round"/>
    <line x1="1032" y1="418" x2="1122" y2="418" stroke="#b86b35" stroke-width="8" stroke-linecap="round"/>
  </g>
  <path d="M330 346 H360" stroke="#d7e6ff" stroke-width="6" stroke-linecap="round"/>
  <path d="M632 346 H662" stroke="#d7e6ff" stroke-width="6" stroke-linecap="round"/>
  <path d="M934 346 H964" stroke="#d7e6ff" stroke-width="6" stroke-linecap="round"/>
  <text x="72" y="620" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Portföy mesajı</text>
  <text x="72" y="654" fill="#d7e6ff" font-family="Segoe UI, Arial, sans-serif" font-size="17">Konumsal veri + karar destek modeli + rapor çıktısı + kullanıcı veri yükleme deneyimi.</text>
</svg>
